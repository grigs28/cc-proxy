services:
  cc-proxy:
    image: cc-proxy:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cc-proxy
    ports:
      - "5566:5566"
    environment:
      - CC_PORT=5566
      - CC_LOG_DIR=/app/log
      - TZ=Asia/Shanghai
    volumes:
      - ../.env:/app/.env
      - ../cc_proxy:/app/cc_proxy
      - ../main.py:/app/main.py
      - ../log:/app/log
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
