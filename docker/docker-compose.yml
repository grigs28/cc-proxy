version: "3"
services:
  cc-proxy-anthropic:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5566:5566"
    environment:
      - CC_MODE=anthropic
      - CC_PORT=5566
    volumes:
      - ../.env:/app/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  cc-proxy-openai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5567:5567"
    environment:
      - CC_MODE=openai
      - CC_PORT=5567
    volumes:
      - ../.env:/app/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
