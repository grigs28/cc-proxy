<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC-Proxy 管理面板</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2>CC-Proxy 管理面板</h2>
            <p>请输入管理员密码登录</p>
            <div style="position:relative">
                <input type="password" id="password-input" placeholder="管理员密码" autofocus>
                <button type="button" onclick="togglePassword()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;padding:2px 6px;font-size:14px">👁</button>
            </div>
            <button class="btn btn-primary" style="width: 100%" onclick="login()">登录</button>
        </div>
    </div>

    <div id="app" style="display:none">
        <header>
            <div class="logo">
                <div class="logo-icon">⚡</div>
                CC-<span>Proxy</span>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary btn-sm" onclick="reloadConfig()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    重新加载
                </button>
                <button class="btn btn-secondary btn-sm" onclick="showChangePassword()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    修改密码
                </button>
                <span id="current-user" style="color:var(--text-secondary);font-size:14px;font-weight:500">当前登录：admin</span>
                <button class="btn btn-danger btn-sm" onclick="logout()">退出</button>
            </div>
        </header>

        <nav>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="dashboard">仪表板</button>
                <button class="nav-tab" data-tab="providers">提供商</button>
                <button class="nav-tab" data-tab="models">模型</button>
                <button class="nav-tab" data-tab="settings">系统配置</button>
            </div>
        </nav>

        <main>
            <!-- 仪表板 -->
            <div id="dashboard-tab" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>服务状态</h3>
                        <div class="value" style="font-size: 1.5rem">
                            <span class="status-indicator">
                                <span class="status-dot online"></span>
                                <span id="stat-status-text">运行中</span>
                            </span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <h3>提供商数量</h3>
                        <div class="value" id="stat-providers">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>模型总数</h3>
                        <div class="value" id="stat-models">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>代理端口</h3>
                        <div class="value" id="stat-port">-</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>系统信息</h2>
                    </div>
                    <div class="card-body">
                        <table>
                            <tbody>
                                <tr><td style="font-weight:600">代理地址</td><td id="info-address">-</td></tr>
                                <tr><td style="font-weight:600">代理端口</td><td id="info-proxy-port">-</td></tr>
                                <tr><td style="font-weight:600">管理端口</td><td id="info-admin-port">5566</td></tr>
                                <tr><td style="font-weight:600">运行时间</td><td id="info-uptime">-</td></tr>
                                <tr><td style="font-weight:600">配置文件</td><td id="info-config-path">-</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 提供商管理 -->
            <div id="providers-tab" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h2>提供商列表</h2>
                        <button class="btn btn-primary" onclick="openProviderModal()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            添加提供商
                        </button>
                    </div>
                    <div class="card-body">
                        <table id="providers-table">
                            <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>Base URL</th>
                                    <th>API Key</th>
                                    <th>超时</th>
                                    <th>模型数</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="providers-body"></tbody>
                        </table>
                        <div id="providers-empty" class="empty-state" style="display: none">
                            <p>暂无提供商，请点击"添加提供商"按钮添加</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 模型列表 -->
            <div id="models-tab" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h2>所有模型</h2>
                        <div style="display:flex;gap:0.5rem">
                            <button class="btn btn-primary btn-sm" onclick="openAddModelModal()">添加模型</button>
                            <button class="btn btn-secondary btn-sm" onclick="testSelectedModels()">测试已选</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteSelectedModels()">删除已选</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table id="models-table">
                            <thead>
                                <tr>
                                    <th><input type="checkbox" id="select-all-models" onchange="toggleAllModels(this)"></th>
                                    <th>模型 ID</th>
                                    <th>显示名称</th>
                                    <th>所属提供商</th>
                                    <th>类型</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="models-body"></tbody>
                        </table>
                        <div id="models-empty" class="empty-state" style="display: none">
                            <p>暂无模型</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 系统配置 -->
            <div id="settings-tab" class="tab-content">
                <div class="card">
                    <div class="card-header">
                        <h2>服务器配置</h2>
                    </div>
                    <div class="card-body">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                            <div class="form-group">
                                <label>监听地址</label>
                                <input type="text" id="settings-host" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                            </div>
                            <div class="form-group">
                                <label>监听端口</label>
                                <input type="number" id="settings-port" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top:1rem">
                    <div class="card-header">
                        <h2>API 透传路径</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label>内置路径（只读）</label>
                            <div id="settings-default-paths" style="display:flex;flex-wrap:wrap;gap:0.5rem"></div>
                        </div>
                        <div class="form-group">
                            <label>自定义路径</label>
                            <div id="settings-custom-paths" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.5rem"></div>
                            <div style="display:flex;gap:0.5rem">
                                <input type="text" id="settings-new-path" placeholder="例如: /v1/audio/transcriptions" style="flex:1;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                                <button class="btn btn-primary btn-sm" onclick="addPassthroughPath()">添加</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top:1rem">
                    <div class="card-header">
                        <h2>SSO 登录配置</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label><input type="checkbox" id="settings-yz-enabled" style="width:18px;height:18px;vertical-align:middle;margin-right:4px"> 启用 SSO 登录</label>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                            <div class="form-group">
                                <label>SSO 登录地址</label>
                                <input type="text" id="settings-yz-url" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                            </div>
                            <div class="form-group">
                                <label>回调地址</label>
                                <input type="text" id="settings-yz-callback" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                            </div>
                        </div>
                        <div class="form-group" style="margin-top:0.5rem">
                            <label>内置白名单（只读）</label>
                            <div id="settings-builtin-paths" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.75rem"></div>
                        </div>
                        <div class="form-group">
                            <label>自定义白名单路径（无需登录即可访问）</label>
                            <div id="settings-public-paths" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.5rem"></div>
                            <div style="display:flex;gap:0.5rem">
                                <input type="text" id="settings-new-public-path" placeholder="例如: /docs" style="flex:1;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                                <button class="btn btn-primary btn-sm" onclick="addPublicPath()">添加</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top:1rem">
                    <div class="card-header">
                        <h2>模型映射</h2>
                    </div>
                    <div class="card-body">
                        <div id="settings-model-map" style="margin-bottom:0.5rem"></div>
                        <div style="display:flex;gap:0.5rem">
                            <input type="text" id="settings-map-from" placeholder="源模型名" style="flex:1;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                            <span style="line-height:2.2;color:var(--text-secondary)">→</span>
                            <input type="text" id="settings-map-to" placeholder="目标模型名" style="flex:1;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                            <button class="btn btn-primary btn-sm" onclick="addModelMap()">添加</button>
                        </div>
                    </div>
                </div>

                <div style="margin-top:1rem;text-align:right">
                    <button class="btn btn-primary" onclick="saveAllSettings()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        保存配置
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 提供商编辑模态框 -->
    <div id="provider-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">添加提供商</h3>
                <button class="modal-close" onclick="closeProviderModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="provider-form" onsubmit="return false">
                    <input type="hidden" id="provider-editing-name" value="">
                    <div class="form-group">
                        <label>提供商名称</label>
                        <input type="text" id="provider-name" required placeholder="例如: openai, anthropic">
                    </div>
                    <div class="form-group">
                        <label>Base URL (OpenAI)</label>
                        <div style="display:flex;gap:1rem;align-items:center">
                            <input type="url" id="provider-url-openai" placeholder="https://api.openai.com/v1" disabled style="flex:1;min-width:0">
                            <input type="checkbox" id="fmt-openai" value="openai" onchange="updateBaseUrlFields()" style="width:18px;height:18px">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Base URL (Anthropic)</label>
                        <div style="display:flex;gap:1rem;align-items:center">
                            <input type="url" id="provider-url-anthropic" placeholder="https://api.anthropic.com/v1" disabled style="flex:1;min-width:0">
                            <input type="checkbox" id="fmt-anthropic" value="anthropic" onchange="updateBaseUrlFields()" style="width:18px;height:18px">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="provider-key" required placeholder="sk-...">
                    </div>
                    <div class="form-group">
                        <label>超时时间 (秒)</label>
                        <input type="number" id="provider-timeout" value="300" min="1">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeProviderModal()">取消</button>
                <button class="btn btn-primary" onclick="saveProvider()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加模型模态框 -->
    <div id="add-model-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="add-model-modal-title">添加模型</h3>
                <button class="modal-close" onclick="closeAddModelModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modal-add-model-editing-provider" value="">
                <input type="hidden" id="modal-add-model-editing-id" value="">
                <div class="form-group">
                    <label>选择提供商</label>
                    <select id="modal-add-model-provider" onchange="onAddModelProviderChange()" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                        <option value="">-- 请选择提供商 --</option>
                    </select>
                </div>
                <div class="form-group" id="modal-add-model-fetch-group" style="display:none">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="fetchModelsForAdd()">获取模型</button>
                    <small id="modal-add-model-fetch-status" style="color:var(--text-secondary);margin-left:0.5rem"></small>
                </div>
                <div class="form-group" id="modal-add-model-select-group" style="display:none">
                    <label>从列表选择 (按住 Ctrl/Cmd 可多选)</label>
                    <select id="modal-add-model-upstream-select" multiple onchange="onUpstreamModelSelect()" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary);min-height:120px">
                        <option value="">-- 手动输入 --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>模型 ID</label>
                    <input type="text" id="modal-add-model-id" placeholder="模型唯一标识 (如: gpt-4o)" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                </div>
                <div class="form-group">
                    <label>显示名称</label>
                    <input type="text" id="modal-add-model-display" placeholder="模型显示名称" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text-primary)">
                </div>
                <div class="form-group">
                    <label>支持格式</label>
                    <div style="display:flex;gap:1rem">
                        <label><input type="checkbox" id="modal-add-model-fmt-openai" value="openai" checked style="width:18px;height:18px"> OpenAI</label>
                        <label><input type="checkbox" id="modal-add-model-fmt-anthropic" value="anthropic" checked style="width:18px;height:18px"> Anthropic</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Anthropic 认证方式</label>
                    <div style="display:flex;gap:0.5rem;align-items:center">
                        <select id="modal-add-model-auth-style" style="flex:1">
                            <option value="auto">自动（两种都发）</option>
                            <option value="bearer">Authorization: Bearer</option>
                            <option value="x-api-key">x-api-key</option>
                        </select>
                        <button type="button" class="btn btn-secondary btn-sm" id="detect-auth-btn" onclick="detectAuthStyle()">探测</button>
                    </div>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="modal-add-model-strip-fields" style="width:18px;height:18px;vertical-align:middle;margin-right:4px"> 过滤非核心字段（thinking、metadata 等）</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddModelModal()">取消</button>
                <button class="btn btn-secondary" id="test-model-btn" onclick="testModelInline()">测试</button>
                <button id="add-model-modal-submit-btn" class="btn btn-primary" onclick="submitAddModel()">添加</button>
            </div>
        </div>
    </div>

    <!-- 模型管理模态框 -->
    <div id="models-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="models-modal-title">管理模型</h3>
                <button class="modal-close" onclick="closeModelsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="models-provider-name">
                <div class="form-group">
                    <label>添加新模型</label>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
                        <input type="text" id="new-model-id" placeholder="模型 ID (如: gpt-4o)" style="flex:1;min-width:120px">
                        <input type="text" id="new-model-display" placeholder="显示名称" style="flex:1;min-width:120px">
                        <div style="display:flex;gap:0.5rem;align-items:center">
                            <label title="OpenAI"><input type="checkbox" id="new-model-openai" value="openai" checked> OpenAI</label>
                            <label title="Anthropic"><input type="checkbox" id="new-model-anthropic" value="anthropic" checked> Anthropic</label>
                        </div>
                        <button class="btn btn-primary" onclick="addModel()">添加</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>已有模型</label>
                    <div id="provider-models-list" class="model-list"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModelsModal()">关闭</button>
            </div>
        </div>
    </div>

    <div id="password-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>修改管理密码</h3>
                <button class="modal-close" onclick="closeChangePassword()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>当前密码</label>
                    <div style="position:relative">
                        <input type="password" id="current-password" placeholder="输入当前密码">
                        <button type="button" onclick="togglePwdField('current-password',this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;padding:2px 6px;font-size:14px">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <div style="position:relative">
                        <input type="password" id="new-password" placeholder="输入新密码">
                        <button type="button" onclick="togglePwdField('new-password',this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;padding:2px 6px;font-size:14px">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <div style="position:relative">
                        <input type="password" id="confirm-password" placeholder="再次输入新密码">
                        <button type="button" onclick="togglePwdField('confirm-password',this)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;padding:2px 6px;font-size:14px">👁</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeChangePassword()">取消</button>
                <button class="btn btn-primary" onclick="changePassword()">确认修改</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="/static/app.js"></script>

</body>

</html>
